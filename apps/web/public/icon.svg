<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>

  <!-- Cloud body: three overlapping circles + filled base -->
  <circle cx="86"  cy="152" r="42" fill="white"/>
  <circle cx="124" cy="126" r="48" fill="white"/>
  <circle cx="165" cy="146" r="38" fill="white"/>
  <rect x="44" y="144" width="168" height="48" fill="white"/>

  <!-- Monitor bezel -->
  <rect x="88" y="100" width="80" height="56" rx="8" fill="#1e3a8a"/>
  <!-- Screen glass -->
  <rect x="93" y="105" width="70" height="43" rx="5" fill="#dbeafe"/>

  <!-- Screen content – three stacked file-rows -->
  <rect x="103" y="115" width="48" height="6" rx="3" fill="#1e40af" opacity="0.65"/>
  <rect x="103" y="126" width="34" height="6" rx="3" fill="#1e40af" opacity="0.45"/>
  <rect x="103" y="137" width="42" height="6" rx="3" fill="#1e40af" opacity="0.45"/>

  <!-- Monitor stand + base -->
  <rect x="120" y="188" width="16" height="14" rx="3" fill="white"/>
  <rect x="107" y="200" width="42" height="9" rx="4.5" fill="white"/>
</svg>
